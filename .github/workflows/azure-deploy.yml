name: Deploy to Azure

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - run: dotnet restore
    - run: dotnet build --configuration Release --no-restore
    - run: dotnet test --configuration Release --no-build
    - run: dotnet publish src/Kairudev.Api/Kairudev.Api.csproj -c Release -o ./publish-api
    - run: dotnet publish src/Kairudev.Web/Kairudev.Web.csproj -c Release -o ./publish-web
    - run: |
        mkdir -p ./publish-api/wwwroot
        cp -r ./publish-web/wwwroot/* ./publish-api/wwwroot/
    - uses: actions/upload-artifact@v4
      with:
        name: kairudev-app
        path: ./publish-api

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: kairudev-app
        path: ./publish
    - uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    - uses: azure/webapps-deploy@v3
      with:
        app-name: kairudev-api-dev
        package: ./publish
    - run: az logout
